# dynret claudebox profile (read by `claudebox up dynret`). CUDA/torch install via pixi in the box.

[project]
name = "dynret"
image = "claudebox-base:latest"

[claude]
bind = true              # bind host ~/.claude RW (shared memory + auth). Default: true.

[workspace]
host_path = "/home/will/dynret"

[ports]
publish = ["9090:9090", "9876:9876"]   # Rerun viewer + gRPC proxy; bound 0.0.0.0 for the tailnet.

[gpu]
enabled = true

# RO data, 1:1 so dynret's configs/it1.local.toml absolute paths resolve unchanged.
[[mounts]]
host = "/home/will/dev/persona_rl"
container = "/home/will/dev/persona_rl"

[[mounts]]
host = "/home/will/dev/persona"
container = "/home/will/dev/persona"
